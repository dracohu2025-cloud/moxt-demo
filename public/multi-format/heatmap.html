    function renderPanel(name, value) {
      const panel = document.getElementById('detail-panel');
      const d = countryDetail[name];

      document.getElementById('panel-flag').textContent = d ? d.flag : '🌍';
      document.getElementById('panel-name').textContent = d ? d.nameZh : (ZH_NAMES[name] || name);

      const body = document.getElementById('panel-body');

      if (!d) {
        // No detailed data
        const rankArr = [...data].sort((a, b) => b.value - a.value);
        const rank = value ? (rankArr.findIndex(x => x.name === name) + 1) : '—';
        body.innerHTML = `
          <div class="rate-hero">
            <div class="rate-big" style="color:${value >= 65 ? '#60a5fa' : value >= 50 ? '#f59e0b' : '#475569'}">${value != null ? value + '%' : 'N/A'}</div>

          ${value != null ? `<div class="rate-bar-wrap"><div class="rate-bar-fill" style="width:${Math.min(value,100)}%"></div></div>` : ''}
          <div class="no-data-state">
            <div class="icon">📊</div>
            <p>该国家详细数据<br>正在整理中</p>
          </div>`;
        panel.classList.add('open');
        return;
      }

      const rankArr = [...data].sort((a, b) => b.value - a.value);
      const rank = rankArr.findIndex(x => x.name === name) + 1;
      const badgeClass = value >= 65 ? 'badge-hot' : value >= 50 ? 'badge-mid' : 'badge-low';
      const badgeText = value >= 65 ? '🔥 高渗透' : value >= 50 ? '📈 增长中' : '⬆ 上升中';
      const rateColor = value >= 65 ? '#60a5fa' : value >= 50 ? '#f59e0b' : '#94a3b8';

      body.innerHTML = `
        <div class="rate-hero">
          <div class="rate-big" style="color:${rateColor}">${value}%</div>
          <div class="rate-meta">
            <div class="rate-label">企业 AI 采用率 · 2025</div>
            <div class="rate-rank">全球第 ${rank} 位 · 同比 ${d.yoy}</div>
